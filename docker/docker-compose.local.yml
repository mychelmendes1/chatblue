services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: chatblue-postgres
    environment:
      POSTGRES_USER: chatblue
      POSTGRES_PASSWORD: chatblue123
      POSTGRES_DB: chatblue
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatblue"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis for caching and queues
  redis:
    image: redis:7-alpine
    container_name: chatblue-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Database migrations (roda antes da API)
  migration:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    image: chatblue-api
    container_name: chatblue-migration
    environment:
      DATABASE_URL: postgresql://chatblue:chatblue123@postgres:5432/chatblue
    command: ["sh", "-c", "cd apps/api && npx prisma@5.22.0 db push --accept-data-loss --force-reset && npx tsx prisma/seed.ts"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # Backend API
  api:
    image: chatblue-api
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: chatblue-api
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://chatblue:chatblue123@postgres:5432/chatblue
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_REFRESH_SECRET: your-super-secret-refresh-key-change-in-production
      API_PORT: 3001
      FRONTEND_URL: http://localhost:3000
    volumes:
      - sessions_data:/app/sessions
    depends_on:
      migration:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Frontend Web
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: chatblue-web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  sessions_data:

networks:
  default:
    name: chatblue-network
