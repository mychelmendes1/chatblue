name: Build and Push Docker Images (dev)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: {}

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-2' }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

jobs:
  build-and-push-dev:
    name: Build and push images to ECR (dev)
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: dev
      API_REPOSITORY: chatblue-api-dev
      WEB_REPOSITORY: chatblue-web-dev
      MIGRATION_REPOSITORY: chatblue-migration-dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repositories exist
        run: |
          set -e
          aws ecr describe-repositories --repository-names "$API_REPOSITORY" >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name "$API_REPOSITORY"

          aws ecr describe-repositories --repository-names "$WEB_REPOSITORY" >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name "$WEB_REPOSITORY"

          aws ecr describe-repositories --repository-names "$MIGRATION_REPOSITORY" >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name "$MIGRATION_REPOSITORY"

      - name: Build and push Docker images (dev)
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL_DEV || 'http://localhost:3001' }}
          NEXT_PUBLIC_SOCKET_URL: ${{ secrets.NEXT_PUBLIC_SOCKET_URL_DEV || 'http://localhost:3001' }}
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY_DEV || '' }}
        run: |
          set -e
          IMAGE_TAG="${GITHUB_SHA}"

          echo "Using registry: $ECR_REGISTRY"
          echo "Building images with tag: $IMAGE_TAG"

          # API (backend)
          docker build \
            -f docker/Dockerfile.api \
            -t "$ECR_REGISTRY/$API_REPOSITORY:$IMAGE_TAG" \
            -t "$ECR_REGISTRY/$API_REPOSITORY:latest" \
            .

          # Web (frontend) com build-args para Next.js
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="$NEXT_PUBLIC_API_URL" \
            --build-arg NEXT_PUBLIC_SOCKET_URL="$NEXT_PUBLIC_SOCKET_URL" \
            --build-arg NEXT_PUBLIC_VAPID_PUBLIC_KEY="$NEXT_PUBLIC_VAPID_PUBLIC_KEY" \
            -f docker/Dockerfile.web \
            -t "$ECR_REGISTRY/$WEB_REPOSITORY:$IMAGE_TAG" \
            -t "$ECR_REGISTRY/$WEB_REPOSITORY:latest" \
            .

          # Migration usa a mesma imagem da API (Prisma migrate deploy)
          docker tag "$ECR_REGISTRY/$API_REPOSITORY:$IMAGE_TAG" "$ECR_REGISTRY/$MIGRATION_REPOSITORY:$IMAGE_TAG"
          docker tag "$ECR_REGISTRY/$API_REPOSITORY:latest" "$ECR_REGISTRY/$MIGRATION_REPOSITORY:latest"

          docker push "$ECR_REGISTRY/$API_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$API_REPOSITORY:latest"

          docker push "$ECR_REGISTRY/$WEB_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$WEB_REPOSITORY:latest"

          docker push "$ECR_REGISTRY/$MIGRATION_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$MIGRATION_REPOSITORY:latest"

      - name: Atualizar API no Portainer (dev)
        if: success()
        run: |
          curl -X POST "${{ secrets.PORTAINER_WEBHOOK_API_DEV }}?tag=${GITHUB_SHA}"

      - name: Atualizar Web no Portainer (dev)
        if: success()
        run: |
          curl -X POST "${{ secrets.PORTAINER_WEBHOOK_WEB_DEV }}?tag=${GITHUB_SHA}"

      - name: Executar migration no Portainer (dev)
        if: success()
        run: |
          curl -X POST "${{ secrets.PORTAINER_WEBHOOK_MIGRATION_DEV }}?tag=${GITHUB_SHA}"
